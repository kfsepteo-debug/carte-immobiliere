<body>

<header>
    <h1>Nos biens à vendre</h1>

<div id="map"></div>

<div class="container" id="listeBiens"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const biens = [

},

}

];

const map = L.map('map').setView([43.6108,3.8767],11);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap'
}
).addTo(map);

const liste = document.getElementById("listeBiens");

biens.forEach(bien => {

L.marker([bien.lat,bien.lng])
.addTo(map)
.bindPopup(
`
<b>${bien.title}</b><br>
${bien.city}<br>
<strong>${bien.price}</strong><br><br>
<a href="${bien.url}" target="_top">
Voir la fiche
</a>
`
);

liste.innerHTML += `
<div class="bien">
<h3>${bien.title}</h3>
<p>${bien.city}</p>
<p><strong>${bien.price}</strong></p>
<a class="btn" href="${bien.url}" target="_top">
Voir la fiche
</a>
</div>
`;

});

</script>
